# Server
spring.application.name=bounty-server
server.port=8080

# PostgreSQL
# Default host 'postgres' matches the docker-compose service name.
# Override DB_URL for local non-Docker development.
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/bountydb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
# Default host 'redis' matches the docker-compose service name.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# Actuator — expose only the health endpoint (used by Render health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
