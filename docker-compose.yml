version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: bounty-postgres
    environment:
      POSTGRES_DB:       bountydb
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bountydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bounty-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bounty-app
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET:   ${JWT_SECRET}
      DB_URL:       jdbc:postgresql://postgres:5432/bountydb
      DB_USERNAME:  postgres
      DB_PASSWORD:  ${DB_PASSWORD}
      REDIS_HOST:   redis
      REDIS_PORT:   6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
